{% extends 'base.html' %}
{% block content %}
<section class="card small">
  <h1>Crear cuenta</h1>
  <form method="post">
    <label>Usuario</label>
    <input name="username" required>
    <label>Contraseña</label>
    <input type="password" name="password" required>
    <button>Crear cuenta</button>
  </form>
  <p>¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a></p>
</section>
{% endblock %}
